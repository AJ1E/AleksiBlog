# Final HTTPS configuration. Copy it to /etc/nginx/conf.d/aleksiz.conf only
# after Certbot has created the certificate files referenced below. This file
# is read by Nginx inside its http {} context, where limit_req_zone is valid.
limit_req_zone $binary_remote_addr zone=aleksiz_login:10m rate=5r/m;
limit_req_status 429;

server {
    listen 80;
    server_name aleksiz.com www.aleksiz.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/aleksiz/acme;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name aleksiz.com www.aleksiz.com;

    ssl_certificate /etc/letsencrypt/live/aleksiz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aleksiz.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    server_tokens off;
    client_max_body_size 256k;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;

    # Observe CSP reports first. Enforce only after the live site has been
    # checked with its actual external fonts, favicons, flags, and maps.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google.com https://flagcdn.com; connect-src 'self' https://cdn.jsdelivr.net;" always;

    location = /api/auth/login {
        limit_req zone=aleksiz_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:4322;
        include /etc/nginx/conf.d/aleksiz-proxy-headers.conf;
    }

    location / {
        proxy_pass http://127.0.0.1:4322;
        include /etc/nginx/conf.d/aleksiz-proxy-headers.conf;
    }
}
