# Temporary HTTP-only configuration used before the first TLS certificate.
# Replace this file with aleksiz.conf after Certbot succeeds.
limit_req_zone $binary_remote_addr zone=aleksiz_login:10m rate=5r/m;
limit_req_status 429;

server {
    listen 80;
    server_name aleksiz.com www.aleksiz.com;

    server_tokens off;
    client_max_body_size 256k;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/aleksiz/acme;
        default_type "text/plain";
    }

    location = /api/auth/login {
        limit_req zone=aleksiz_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:4322;
        include /etc/nginx/conf.d/aleksiz-proxy-headers.conf;
    }

    location / {
        proxy_pass http://127.0.0.1:4322;
        include /etc/nginx/conf.d/aleksiz-proxy-headers.conf;
    }
}
