<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Local helper backends</title>
  <desc id="desc">Diagram-style cover for local helper services.</desc>
  <rect width="1200" height="630" fill="#f8f5ef"/>
  <g fill="none" stroke="#d7c9b8" stroke-width="3">
    <path d="M210 315 H990"/>
    <path d="M600 190 V440"/>
  </g>
  <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="110" y="250" width="210" height="130" rx="18" fill="#ffffff" stroke="#e3d6c6"/>
    <text x="215" y="308" text-anchor="middle" font-size="24" font-weight="700" fill="#2d2926">Browser</text>
    <text x="215" y="342" text-anchor="middle" font-size="16" fill="#756d64">same-origin</text>
    <rect x="495" y="250" width="210" height="130" rx="18" fill="#e56f35"/>
    <text x="600" y="308" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">Astro BFF</text>
    <text x="600" y="342" text-anchor="middle" font-size="16" fill="#fff4eb">auth + redaction</text>
    <rect x="880" y="250" width="210" height="130" rx="18" fill="#ffffff" stroke="#e3d6c6"/>
    <text x="985" y="308" text-anchor="middle" font-size="24" font-weight="700" fill="#2d2926">Helpers</text>
    <text x="985" y="342" text-anchor="middle" font-size="16" fill="#756d64">loopback services</text>
    <text x="90" y="110" font-family="Georgia,serif" font-size="64" fill="#2d2926">Local helper backends</text>
    <text x="94" y="154" font-size="23" fill="#6b625a">Keep private data local. Publish only safe summaries.</text>
  </g>
